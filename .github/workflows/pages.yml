name: Deploy Dolmenwick Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install Quartz dependencies
        working-directory: .quartz
        run: npm ci

      - name: Install referee tool dependencies
        working-directory: .referee-tools/party-generator
        run: npm ci

      - name: Install Playwright browser
        working-directory: .referee-tools/party-generator
        run: npx playwright install --with-deps chromium

      - name: Prepare Quartz content
        working-directory: .quartz
        run: QUARTZ_PREPARED_CONTENT_DIR="$RUNNER_TEMP/dolmenwick-quartz-content" node scripts/prepare-content.mjs

      - name: Run generator tests
        working-directory: .referee-tools/party-generator
        run: npm test

      - name: Build Quartz
        working-directory: .quartz
        run: QUARTZ_PREPARED_CONTENT_DIR="$RUNNER_TEMP/dolmenwick-quartz-content" npx quartz build --directory "$RUNNER_TEMP/dolmenwick-quartz-content" --output public

      - name: Copy referee tools
        working-directory: .quartz
        run: node scripts/copy-referee-tools.mjs

      - name: Validate output
        working-directory: .quartz
        run: node scripts/validate-output.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
